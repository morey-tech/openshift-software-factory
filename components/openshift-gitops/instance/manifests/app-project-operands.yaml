# See docs/decisions/0013-appproject-per-appset.md
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: operands
  namespace: openshift-gitops
spec:
  description: Operand CRs and configuration for software factory components
  sourceRepos:
    - https://github.com/morey-tech/openshift-software-factory.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: '*'
  # Namespace creation required for CreateNamespace=true sync option.
  # ClusterRole/ClusterRoleBinding required for Jobs that need cluster-scoped API access
  # (e.g. reading ingresses.config.openshift.io for apps domain discovery).
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: 'rbac.authorization.k8s.io'
      kind: ClusterRole
    - group: 'rbac.authorization.k8s.io'
      kind: ClusterRoleBinding
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
