apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: job-gitlab-root-password
    files:
      - gitlab-root-password-job.sh

resources:
  - cluster-config.yaml
  - gitlab-root-password-job.yaml
  - gitlab.yaml

replacements:
  - source:
      kind: ConfigMap
      name: cluster-config
      fieldPath: data.appsDomain
    targets:
      - select:
          kind: GitLab
          name: gitlab
        fieldPaths:
          - spec.chart.values.global.hosts.domain
