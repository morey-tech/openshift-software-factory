# Dynamic plugin configuration for Red Hat Developer Hub.
# Plugins are installed at startup by the RHDH init container.
# Reference: https://docs.redhat.com/en/documentation/red_hat_developer_hub/1.9/html/administration_guide_for_red_hat_developer_hub/rhdh-installing-dynamic-plugins
apiVersion: v1
kind: ConfigMap
metadata:
  name: dynamic-plugins-rhdh
  namespace: rhdh
data:
  dynamic-plugins.yaml: |
    includes:
      - dynamic-plugins.default.yaml
    plugins:
      # GitLab catalog discovery — discovers catalog-info.yaml files from GitLab groups
      - package: './dynamic-plugins/dist/backstage-plugin-catalog-backend-module-gitlab-dynamic'
        disabled: false
        pluginConfig:
          catalog:
            providers:
              gitlab:
                software-factory:
                  host: gitlab.${GITLAB_HOST}
                  group: software-factory
                  branch: main
                  entityFilename: catalog-info.yaml
                  schedule:
                    frequency:
                      minutes: 30
                    timeout:
                      minutes: 3

      # Argo CD plugin — shows sync status and history on component pages
      - package: './dynamic-plugins/dist/roadiehq-backstage-plugin-argo-cd'
        disabled: false
      - package: './dynamic-plugins/dist/roadiehq-backstage-plugin-argo-cd-backend-dynamic'
        disabled: false

      # Kubernetes / Topology plugin — shows workload topology on component pages
      - package: './dynamic-plugins/dist/backstage-plugin-kubernetes'
        disabled: false
      - package: './dynamic-plugins/dist/backstage-plugin-kubernetes-backend-dynamic'
        disabled: false
      - package: './dynamic-plugins/dist/janus-idp-backstage-plugin-topology'
        disabled: false

      # Tekton plugin — shows PipelineRun status on component pages
      - package: './dynamic-plugins/dist/janus-idp-backstage-plugin-tekton'
        disabled: false
