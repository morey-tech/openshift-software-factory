apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cert-manager-operator
resources:
  - operator-group.yaml
  - subscription.yaml

helmCharts:
  # OpenShift Route support for cert-manager — enables cert-manager to manage
  # TLS certificates for OpenShift Route objects in addition to Ingresses.
  # https://github.com/cert-manager/openshift-routes
  - name: openshift-routes
    includeCRDs: true
    version: v0.8.5
    repo: oci://ghcr.io/cert-manager/charts
    releaseName: openshift-routes
