# Backstage app-config for Red Hat Developer Hub.
# Environment variables injected from the rhdh-gitlab-token Secret:
#   GITLAB_TOKEN — GitLab personal/group access token
#
# The RHDH operator injects RHDH_ROUTE_HOST automatically from the created Route.
# Reference: https://docs.redhat.com/en/documentation/red_hat_developer_hub/1.9
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-rhdh
  namespace: rhdh
data:
  app-config-rhdh.yaml: |
    app:
      title: Software Factory Developer Hub
      baseUrl: https://${RHDH_ROUTE_HOST}

    backend:
      auth:
        keys:
          - secret: ${BACKEND_SECRET}
      baseUrl: https://${RHDH_ROUTE_HOST}
      cors:
        origin: https://${RHDH_ROUTE_HOST}
        credentials: true
      database:
        client: better-sqlite3
        connection: ':memory:'

    # Guest sign-in for initial setup.
    # Replace with GitLab OAuth or an OIDC provider in Phase 4.
    # See docs/decisions/0015-developer-hub-instance-namespace.md
    auth:
      environment: development
      providers:
        guest:
          dangerouslyAllowOutsideDevelopment: true

    signInPage: guest

    # Self-hosted GitLab integration.
    # GITLAB_TOKEN must be set in the rhdh-gitlab-token Secret.
    # IMPORTANT: Replace <GITLAB_ROUTE_HOST> with the actual GitLab route hostname.
    # Find it with: oc get route -n gitlab-system -o jsonpath='{.items[0].spec.host}'
    integrations:
      gitlab:
        - host: <GITLAB_ROUTE_HOST>
          apiBaseUrl: https://<GITLAB_ROUTE_HOST>/api/v4
          baseUrl: https://<GITLAB_ROUTE_HOST>
          token: ${GITLAB_TOKEN}

    catalog:
      rules:
        - allow:
            - Component
            - System
            - Group
            - Resource
            - Location
            - Template
            - API

      # Seed location: templates and shared catalog items in the software-factory group.
      # Add catalog-info.yaml files to GitLab repos to register them here.
      locations: []

      providers:
        # GitLab org sync — imports GitLab groups and members as Backstage Groups/Users.
        gitlabOrg:
          software-factory-org:
            host: <GITLAB_ROUTE_HOST>
            group: software-factory
            orgEnabled: true
            schedule:
              frequency:
                minutes: 10
              timeout:
                minutes: 3

    # Kubernetes plugin configuration — connects to the local cluster.
    kubernetes:
      serviceLocatorMethod:
        type: multiTenant
      clusterLocatorMethods:
        - type: config
          clusters:
            - url: https://kubernetes.default.svc
              name: local
              authProvider: serviceAccount
              skipTLSVerify: true
              serviceAccountToken: ${K8S_SERVICE_ACCOUNT_TOKEN}

    # ArgoCD plugin configuration.
    argocd:
      appLocatorMethods:
        - type: config
          instances:
            - name: software-factory-argocd
              url: https://software-factory-argocd-server-openshift-gitops.${RHDH_ROUTE_HOST}
              token: ${ARGOCD_TOKEN}
