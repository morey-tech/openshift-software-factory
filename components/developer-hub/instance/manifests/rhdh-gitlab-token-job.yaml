# Generates the rhdh-secrets Secret at deploy time by calling the GitLab API
# to create a personal access token for the root user.
#
# The Job reads the GitLab root password from gitlab-system, discovers the
# apps domain from the cluster ingress config, and writes the rhdh-secrets
# Secret into the rhdh namespace.
#
# See docs/decisions/0020-gitlab-token-job-for-rhdh.md and ADR-0018.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-rhdh-gitlab-token
  namespace: rhdh
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
# Allows the Job to read its own UID (for ownerReference) and manage rhdh-secrets.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-rhdh-gitlab-token
  namespace: rhdh
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-rhdh-gitlab-token
  namespace: rhdh
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
subjects:
  - kind: ServiceAccount
    name: job-rhdh-gitlab-token
    namespace: rhdh
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: job-rhdh-gitlab-token
---
# Allows the Job (running in rhdh) to read the GitLab root password from gitlab-system.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-rhdh-gitlab-token-reader
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["gitlab-initial-root-password"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-rhdh-gitlab-token-reader
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
subjects:
  - kind: ServiceAccount
    name: job-rhdh-gitlab-token
    namespace: rhdh
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: job-rhdh-gitlab-token-reader
---
# Allows the Job to read the cluster apps domain from the OpenShift ingress config.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: job-rhdh-gitlab-token
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
rules:
  - apiGroups: ["config.openshift.io"]
    resources: ["ingresses"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: job-rhdh-gitlab-token
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
subjects:
  - kind: ServiceAccount
    name: job-rhdh-gitlab-token
    namespace: rhdh
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: job-rhdh-gitlab-token
---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-rhdh-gitlab-token
  namespace: rhdh
  annotations:
    # Run before wave 0 resources (Backstage CR) so rhdh-secrets exists at startup.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  template:
    spec:
      containers:
        - name: generate-token
          image: registry.redhat.io/openshift4/ose-cli
          command:
            - /bin/bash
            - -c
            - /scripts/rhdh-gitlab-token-job.sh
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: job-rhdh-gitlab-token
            defaultMode: 0755
      restartPolicy: Never
      serviceAccountName: job-rhdh-gitlab-token
  backoffLimit: 4
