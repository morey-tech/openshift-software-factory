# Generates the gitlab-initial-root-password Secret at deploy time.
# See docs/decisions/0018-job-generated-secrets-with-owner-references.md
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-gitlab-root-password
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-gitlab-root-password
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
rules:
  # Read own UID to set on the Secret ownerReference.
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get"]
  # Create the initial root password Secret (and get to check idempotency).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-gitlab-root-password
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
subjects:
  - kind: ServiceAccount
    name: job-gitlab-root-password
    namespace: gitlab-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: job-gitlab-root-password
---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-gitlab-root-password
  namespace: gitlab-system
  annotations:
    # Run before default wave (0) resources so the Secret exists when the GitLab CR is applied.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  template:
    spec:
      containers:
        - name: generate-password
          image: registry.redhat.io/openshift4/ose-cli
          command:
            - /bin/bash
            - -c
            - /scripts/gitlab-root-password-job.sh
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: job-gitlab-root-password
            defaultMode: 0755
      restartPolicy: Never
      serviceAccountName: job-gitlab-root-password
  backoffLimit: 4
