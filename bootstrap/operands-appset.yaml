apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: operands
  namespace: openshift-gitops
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    # See ../docs/decisions/0001-use-git-files-generator-for-applicationsets.md
    - git:
        repoURL: https://github.com/morey-tech/openshift-software-factory.git
        revision: main
        files:
          - path: "components/*/instance/config.json"
      selector:
        matchExpressions:
          # See ../docs/decisions/0003-disable-flag-in-config-json.md
          - key: disabled
            operator: NotIn
            values:
              - "true"
  template:
    metadata:
      name: "{{ index .path.segments 1 }}-instance"
    spec:
      project: default
      source:
        repoURL: https://github.com/morey-tech/openshift-software-factory.git
        targetRevision: main
        path: "{{ .path.path }}"
        # See ../docs/decisions/0008-argocdignore-for-config-json-exclusion.md
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          # See ../docs/decisions/0004-auto-create-namespaces-in-applicationsets.md
          - CreateNamespace=true
