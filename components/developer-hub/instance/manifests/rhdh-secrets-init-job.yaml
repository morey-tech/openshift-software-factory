# Populates the rhdh-secrets Secret at deploy time with all credentials RHDH
# needs at startup: GITLAB_TOKEN, BACKEND_SECRET, APPS_DOMAIN, ARGOCD_TOKEN.
#
# The Job reads the GitLab root password from gitlab-system, discovers the
# apps domain from the cluster ingress config, and reads the ArgoCD local-user
# token from the Secret the ArgoCD operator auto-generates for the 'rhdh'
# local user (Secret name: rhdh-local-user in openshift-gitops).
#
# See docs/decisions/0020-gitlab-token-job-for-rhdh.md, ADR-0018, and ADR-XXXX.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-rhdh-secrets-init
  namespace: rhdh
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
# Allows the Job to read its own UID (for ownerReference) and manage rhdh-secrets.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-rhdh-secrets-init
  namespace: rhdh
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-rhdh-secrets-init
  namespace: rhdh
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
subjects:
  - kind: ServiceAccount
    name: job-rhdh-secrets-init
    namespace: rhdh
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: job-rhdh-secrets-init
---
# Allows the Job (running in rhdh) to read the GitLab root password from gitlab-system.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-rhdh-secrets-init-gitlab-reader
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["gitlab-initial-root-password"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-rhdh-secrets-init-gitlab-reader
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
subjects:
  - kind: ServiceAccount
    name: job-rhdh-secrets-init
    namespace: rhdh
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: job-rhdh-secrets-init-gitlab-reader
---
# Allows the Job to read the ArgoCD local-user token Secret from openshift-gitops.
# The ArgoCD operator creates a Secret named {username}-local-user when
# localUsers[].autoRenewToken is true.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-rhdh-secrets-init-argocd-reader
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["rhdh-local-user"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-rhdh-secrets-init-argocd-reader
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
subjects:
  - kind: ServiceAccount
    name: job-rhdh-secrets-init
    namespace: rhdh
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: job-rhdh-secrets-init-argocd-reader
---
# Allows the Job to read the cluster apps domain from the OpenShift ingress config.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: job-rhdh-secrets-init
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
rules:
  - apiGroups: ["config.openshift.io"]
    resources: ["ingresses"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: job-rhdh-secrets-init
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
subjects:
  - kind: ServiceAccount
    name: job-rhdh-secrets-init
    namespace: rhdh
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: job-rhdh-secrets-init
---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-rhdh-secrets-init
  namespace: rhdh
  annotations:
    # Run before wave 0 resources (Backstage CR) so rhdh-secrets exists at startup.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  template:
    spec:
      containers:
        - name: init-secrets
          image: registry.redhat.io/openshift4/ose-cli
          command:
            - /bin/bash
            - -c
            - /scripts/rhdh-secrets-init-job.sh
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: job-rhdh-secrets-init
            defaultMode: 0755
      restartPolicy: Never
      serviceAccountName: job-rhdh-secrets-init
  backoffLimit: 4
