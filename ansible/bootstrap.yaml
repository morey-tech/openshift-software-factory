---
- name: Bootstrap OpenShift Software Factory
  hosts: openshift_cluster
  gather_facts: false
  module_defaults:
    # See ../docs/decisions/0005-explicit-kubeconfig-for-ansible-k8s-modules.md
    kubernetes.core.k8s:
      kubeconfig: "{{ lookup('env', 'KUBECONFIG') | default('~/.kube/config', true) }}"
      validate_certs: "{{ lookup('env', 'K8S_AUTH_VERIFY_SSL') | default('false', true) }}"
    kubernetes.core.k8s_info:
      kubeconfig: "{{ lookup('env', 'KUBECONFIG') | default('~/.kube/config', true) }}"
      validate_certs: "{{ lookup('env', 'K8S_AUTH_VERIFY_SSL') | default('false', true) }}"
  tasks:
    # --- OpenShift GitOps Operator ---
    - name: Create openshift-gitops-operator namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: openshift-gitops-operator

    - name: Apply OperatorGroup
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../components/openshift-gitops/operator/manifests/operator-group.yaml"

    - name: Apply GitOps operator Subscription
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../components/openshift-gitops/operator/manifests/subscription.yaml"

    - name: Wait for GitOps operator to be ready
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        namespace: openshift-gitops-operator
        label_selectors:
          - "operators.coreos.com/openshift-gitops-operator.openshift-gitops-operator="
      register: csv_result
      until:
        - csv_result.resources | length > 0
        - csv_result.resources[0].status.phase | default('') == 'Succeeded'
      retries: 30
      delay: 10

    # --- OpenShift GitOps Instance ---
    - name: Create openshift-gitops namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: openshift-gitops

    - name: Apply ClusterRole for Argo CD
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../components/openshift-gitops/instance/manifests/cluster-role.yaml"

    - name: Apply cluster-admins group
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../components/openshift-gitops/instance/manifests/cluster-admins-group.yaml"

    - name: Apply ClusterRoleBinding for cluster-admins group
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../components/openshift-gitops/instance/manifests/cluster-role-binding.yaml"

    - name: Apply ArgoCD instance
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../components/openshift-gitops/instance/manifests/argocd.yaml"

    - name: Wait for ArgoCD instance to be ready
      kubernetes.core.k8s_info:
        api_version: argoproj.io/v1beta1
        kind: ArgoCD
        name: software-factory-argocd
        namespace: openshift-gitops
      register: argocd_result
      until:
        - argocd_result.resources | length > 0
        - argocd_result.resources[0].status.phase | default('') == 'Available'
      retries: 30
      delay: 10

    # --- openshift-gitops-instance Application (standalone) ---
    # Applied outside the bootstrap root Application so it is not in the cascade
    # chain. This keeps the ArgoCD controller alive while all other Applications
    # are cascade-deleted during teardown.
    # finalizers: [] is required — if the cascade finalizer were set, deleting
    # this Application during teardown would attempt to cascade-delete the ArgoCD
    # CR, killing the controller that must process those same finalizers.
    # See ../docs/decisions/0011-decouple-gitops-instance-from-bootstrap-cascade.md
    - name: Apply standalone openshift-gitops-instance Application
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: openshift-gitops-instance
            namespace: openshift-gitops
            finalizers: []
          spec:
            project: default
            source:
              repoURL: https://github.com/morey-tech/openshift-software-factory.git
              targetRevision: main
              path: components/openshift-gitops/instance/manifests
            destination:
              server: https://kubernetes.default.svc
              namespace: openshift-gitops
            syncPolicy:
              automated:
                selfHeal: true
                prune: true

    # --- Root Application ---
    # See ../docs/decisions/0002-deploy-root-application-with-ansible.md
    - name: Apply the root Argo CD Application
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: bootstrap
            namespace: openshift-gitops
          spec:
            project: default
            source:
              repoURL: https://github.com/morey-tech/openshift-software-factory.git
              targetRevision: main
              path: bootstrap
            destination:
              server: https://kubernetes.default.svc
              namespace: openshift-gitops
            syncPolicy:
              automated:
                selfHeal: true
                prune: true

    # --- Output ---
    - name: Get Argo CD server Route
      kubernetes.core.k8s_info:
        api_version: route.openshift.io/v1
        kind: Route
        name: software-factory-argocd-server
        namespace: openshift-gitops
      register: argocd_route

    - name: Print Argo CD URL
      ansible.builtin.debug:
        msg: "Argo CD is available at: https://{{ argocd_route.resources[0].spec.host }}"
