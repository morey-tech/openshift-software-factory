# Cluster-specific configuration for the GitLab instance.
# Edit appsDomain to match this cluster's apps subdomain before syncing.
# Find the value with:
#   oc get ingresses.config.openshift.io cluster -o jsonpath='{.spec.domain}'
#
# Kustomize replacements read appsDomain from here and inject it into the
# GitLab CR's spec.chart.values.global.hosts.domain at build time.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-config
  namespace: gitlab-system
data:
  appsDomain: apps.cluster-7v46r.dynamic.redhatworkshops.io
