# Secrets for Red Hat Developer Hub.
# IMPORTANT: Replace placeholder values before syncing this Application.
#
# GITLAB_TOKEN: GitLab personal or group access token with read_api + read_repository scopes.
#   Create in GitLab: Group > Settings > Access Tokens (group token recommended)
#   Generate: openssl rand -base64 32
#
# BACKEND_SECRET: Random secret used to sign backend-to-backend service tokens.
#   Generate: openssl rand -base64 32
apiVersion: v1
kind: Secret
metadata:
  name: rhdh-secrets
  namespace: rhdh
type: Opaque
stringData:
  GITLAB_TOKEN: REPLACE_WITH_GITLAB_TOKEN
  BACKEND_SECRET: REPLACE_WITH_RANDOM_SECRET
