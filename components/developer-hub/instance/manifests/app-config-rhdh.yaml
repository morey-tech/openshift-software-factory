# Backstage app-config for Red Hat Developer Hub.
# Environment variables injected from rhdh-secrets:
#   GITLAB_TOKEN   — GitLab personal access token
#   BACKEND_SECRET — random backend signing secret
#   APPS_DOMAIN    — cluster wildcard domain
#   ARGOCD_TOKEN   — ArgoCD local-user API token (non-expiring, user: rhdh)
#
# The RHDH operator injects RHDH_ROUTE_HOST automatically from the created Route.
# Reference: https://docs.redhat.com/en/documentation/red_hat_developer_hub/1.9
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-rhdh
  namespace: rhdh
data:
  app-config-rhdh.yaml: |
    app:
      title: Software Factory Developer Hub
      baseUrl: https://${RHDH_ROUTE_HOST}

    backend:
      auth:
        keys:
          - secret: ${BACKEND_SECRET}
      baseUrl: https://${RHDH_ROUTE_HOST}
      cors:
        origin: https://${RHDH_ROUTE_HOST}
        credentials: true
      database:
        client: better-sqlite3
        connection: ':memory:'

    # Guest sign-in for initial setup.
    # Replace with GitLab OAuth or an OIDC provider in Phase 4.
    # See docs/decisions/0015-developer-hub-instance-namespace.md
    auth:
      environment: development
      providers:
        guest:
          dangerouslyAllowOutsideDevelopment: true

    signInPage: guest

    # Self-hosted GitLab integration.
    # GITLAB_TOKEN and APPS_DOMAIN are injected from rhdh-secrets by
    # job-rhdh-secrets-init, which discovers APPS_DOMAIN from the cluster
    # ingress config at deploy time.
    integrations:
      gitlab:
        - host: gitlab.${APPS_DOMAIN}
          apiBaseUrl: https://gitlab.${APPS_DOMAIN}/api/v4
          baseUrl: https://gitlab.${APPS_DOMAIN}
          token: ${GITLAB_TOKEN}

    catalog:
      rules:
        - allow:
            - Component
            - System
            - Group
            - Resource
            - Location
            - Template
            - API

      # Static seed location — points to the software-factory-catalog repo seeded by
      # the gitlab-group-init-job (Phase 5.0). RHDH loads this at startup so the
      # golden path template is immediately discoverable without waiting for the next
      # gitlabOrg sync cycle.
      locations:
        - type: url
          target: https://gitlab.${APPS_DOMAIN}/software-factory/platform/software-factory-catalog/-/raw/main/catalog-info.yaml

      providers:
        # GitLab org sync — imports GitLab groups and members as Backstage Groups/Users.
        gitlabOrg:
          software-factory-org:
            host: gitlab.${APPS_DOMAIN}
            group: software-factory
            orgEnabled: true
            schedule:
              frequency:
                minutes: 10
              timeout:
                minutes: 3

    # Kubernetes plugin configuration — connects to the local cluster.
    kubernetes:
      serviceLocatorMethod:
        type: multiTenant
      clusterLocatorMethods:
        - type: config
          clusters:
            - url: https://kubernetes.default.svc
              name: local
              authProvider: serviceAccount
              skipTLSVerify: true
              serviceAccountToken: ${K8S_SERVICE_ACCOUNT_TOKEN}

    # ArgoCD plugin configuration.
    # Uses the in-cluster service URL — the backend plugin calls ArgoCD server-side
    # so there is no need to traverse the ingress.
    argocd:
      appLocatorMethods:
        - type: config
          instances:
            - name: software-factory-argocd
              url: https://software-factory-argocd-server.openshift-gitops.svc
              token: ${ARGOCD_TOKEN}

    # Proxy configuration.
    # Routes /argocd/api through the Backstage backend to the ArgoCD API so that
    # ARGOCD_TOKEN is never exposed to the browser.
    # Path rewrite strips the /api/proxy/argocd/api prefix added by the Backstage
    # proxy middleware before forwarding to the ArgoCD /api/v1 tree.
    proxy:
      endpoints:
        /argocd/api:
          target: https://software-factory-argocd-server.openshift-gitops.svc/api/v1
          changeOrigin: true
          secure: false
          pathRewrite:
            '^/api/proxy/argocd/api': '/api/v1'
          headers:
            Cookie: 'argocd.token=${ARGOCD_TOKEN}'

    # Scaffolder globals injected into every template step via ${{ globals.X }}.
    # Derived from env vars already available in the rhdh-secrets Secret so no
    # user input is needed for cluster-specific host values.
    scaffolder:
      additionalTemplateGlobals:
        gitlabHost: gitlab.${APPS_DOMAIN}
        devspacesHost: devspaces.${APPS_DOMAIN}
        argocdUrl: https://software-factory-argocd-server-openshift-gitops.${APPS_DOMAIN}
