---
- name: Teardown OpenShift Software Factory Bootstrap
  hosts: openshift_cluster
  gather_facts: false
  module_defaults:
    # See ../docs/decisions/0005-explicit-kubeconfig-for-ansible-k8s-modules.md
    kubernetes.core.k8s:
      kubeconfig: "{{ lookup('env', 'KUBECONFIG') | default('~/.kube/config', true) }}"
      validate_certs: "{{ lookup('env', 'K8S_AUTH_VERIFY_SSL') | default('false', true) }}"
    kubernetes.core.k8s_info:
      kubeconfig: "{{ lookup('env', 'KUBECONFIG') | default('~/.kube/config', true) }}"
      validate_certs: "{{ lookup('env', 'K8S_AUTH_VERIFY_SSL') | default('false', true) }}"
  tasks:
    # See ../docs/decisions/0010-teardown-playbook-design.md
    # Deleting the root Application triggers ArgoCD's cascade finalizer:
    # bootstrap → ApplicationSets → child Applications → managed resources (Subscriptions, etc.)
    # The Application will not fully disappear until the entire chain is deleted.
    - name: Delete root ArgoCD Application
      kubernetes.core.k8s:
        state: absent
        api_version: argoproj.io/v1alpha1
        kind: Application
        name: bootstrap
        namespace: openshift-gitops

    # Terminate any in-progress sync operations after triggering deletion.
    # Deletion is issued first so auto-sync cannot race against the termination
    # (a re-triggered sync would fight the cascade). Once the Applications are
    # marked for deletion, any running syncs are aborted by patching operation
    # to null via JSON Merge Patch (null removes the key), unblocking deletion.
    - name: Get all Applications
      kubernetes.core.k8s_info:
        api_version: argoproj.io/v1alpha1
        kind: Application
        namespace: openshift-gitops
      register: all_apps

    - name: Terminate running sync operations
      kubernetes.core.k8s:
        state: patched
        api_version: argoproj.io/v1alpha1
        kind: Application
        name: "{{ item.metadata.name }}"
        namespace: openshift-gitops
        merge_type: merge
        definition:
          operation: null
      loop: >-
        {{
          all_apps.resources
          | selectattr('status.operationState', 'defined')
          | selectattr('status.operationState.phase', 'equalto', 'Running')
          | list
        }}
      loop_control:
        label: "{{ item.metadata.name }}"

    # Explicitly delete ApplicationSets in case the bootstrap cascade finalizer did not
    # propagate (e.g. if the Application was created without the cascade finalizer).
    # state: absent is idempotent — no-op if already deleted by the cascade above.
    - name: Delete ApplicationSets
      kubernetes.core.k8s:
        state: absent
        api_version: argoproj.io/v1alpha1
        kind: ApplicationSet
        name: "{{ item }}"
        namespace: openshift-gitops
      loop:
        - operators
        - operands

    # Wait for all cascade-managed Applications to be removed before proceeding.
    # The bootstrap Application's finalizer removes the ApplicationSets, which in
    # turn cascade-delete their child Applications. The bootstrap CR itself may
    # disappear before child Applications are fully gone, so waiting on the root
    # Application alone is insufficient. Instead, wait until only the standalone
    # openshift-gitops-instance Application remains (it has no cascade finalizer
    # and is deleted separately below).
    - name: Wait for all cascade-managed Applications to be removed
      kubernetes.core.k8s_info:
        api_version: argoproj.io/v1alpha1
        kind: Application
        namespace: openshift-gitops
      register: apps_result
      until: >
        apps_result.resources
        | selectattr('metadata.name', '!=', 'openshift-gitops-instance')
        | list
        | length == 0
      retries: 120
      delay: 10

    # The standalone Application has no cascade finalizer so deletion is instant.
    # See ../docs/decisions/0011-decouple-gitops-instance-from-bootstrap-cascade.md
    - name: Delete standalone openshift-gitops-instance Application
      kubernetes.core.k8s:
        state: absent
        api_version: argoproj.io/v1alpha1
        kind: Application
        name: openshift-gitops-instance
        namespace: openshift-gitops

    # CSVs are created by OLM and are not managed by ArgoCD, so they are not
    # removed by the cascade above. For the shared openshift-operators namespace
    # (cannot be deleted), CSVs must be explicitly removed. Namespace deletion
    # below handles CSVs in dedicated namespaces.
    - name: Get all CSVs in openshift-operators
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        namespace: openshift-operators
      register: openshift_operators_csvs

    - name: Delete all CSVs in openshift-operators
      kubernetes.core.k8s:
        state: absent
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        name: "{{ item.metadata.name }}"
        namespace: openshift-operators
      loop: "{{ openshift_operators_csvs.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    # When a CSV is deleted its InstallPlan is also deleted, but OLM-generated
    # subscriptions in openshift-operators (e.g. devworkspace-operator, created
    # automatically as a dependency) retain an olm.generated-by annotation that
    # references the now-deleted InstallPlan. On the next bootstrap OLM enters a
    # tight retry loop trying to look up that InstallPlan, starving all other
    # subscriptions (including openshift-pipelines-operator) from being processed.
    # Remove the stale annotation from every subscription in openshift-operators
    # so OLM starts clean on re-bootstrap.
    - name: Get all Subscriptions in openshift-operators
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: Subscription
        namespace: openshift-operators
      register: openshift_operators_subs

    - name: Remove stale olm.generated-by annotation from Subscriptions
      kubernetes.core.k8s:
        state: patched
        api_version: operators.coreos.com/v1alpha1
        kind: Subscription
        name: "{{ item.metadata.name }}"
        namespace: openshift-operators
        definition:
          metadata:
            annotations:
              olm.generated-by: null
      loop: >-
        {{
          openshift_operators_subs.resources
          | selectattr('metadata.annotations', 'defined')
          | selectattr('metadata.annotations["olm.generated-by"]', 'defined')
          | list
        }}
      loop_control:
        label: "{{ item.metadata.name }}"

    # Explicitly delete the ArgoCD CR and wait for the operator to finish processing
    # its finalizer (argoproj.io/finalizer) before removing the operator namespace.
    # The openshift-gitops-instance Application has no cascade finalizer so Argo CD
    # does not delete the ArgoCD CR when the Application is removed — it must be
    # deleted here. If the operator is removed first, nothing can process the finalizer
    # and the openshift-gitops namespace gets stuck in Terminating.
    - name: Delete ArgoCD instance
      kubernetes.core.k8s:
        state: absent
        api_version: argoproj.io/v1beta1
        kind: ArgoCD
        name: software-factory-argocd
        namespace: openshift-gitops

    - name: Wait for ArgoCD instance to be fully removed
      kubernetes.core.k8s_info:
        api_version: argoproj.io/v1beta1
        kind: ArgoCD
        name: software-factory-argocd
        namespace: openshift-gitops
      register: argocd_result
      until: argocd_result.resources | length == 0
      retries: 60
      delay: 10

    - name: Delete openshift-gitops-operator namespace
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Namespace
        name: openshift-gitops-operator

    - name: Wait for openshift-gitops-operator namespace to terminate
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: openshift-gitops-operator
      register: ns_result
      until: ns_result.resources | length == 0
      retries: 60
      delay: 10

    - name: Delete openshift-gitops namespace
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Namespace
        name: openshift-gitops

    - name: Wait for openshift-gitops namespace to terminate
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: openshift-gitops
      register: ns_result
      until: ns_result.resources | length == 0
      retries: 60
      delay: 10

    # Explicitly delete and wait for operator namespaces that host CSVs.
    # The ArgoCD cascade removes the Subscription and OperatorGroup, triggering OLM to
    # clean up the CSV, but the namespace may still be terminating when the cascade
    # Application is gone. If the namespace lingers, its CSV remains on the cluster
    # and causes OLM constraint errors ("exists and is not referenced by a subscription")
    # when re-bootstrapping. state: absent is idempotent if already gone.
    - name: Delete operator namespaces
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Namespace
        name: "{{ item }}"
      loop:
        - gitlab-system        # gitlab operator + instance (shared namespace)
        - rhdh                 # developer-hub instance
        - rhdh-operator        # developer-hub operator
        - quay-operator        # quay operator + instance (shared namespace)
        - openshift-devspaces  # dev spaces instance (operator is in openshift-operators)

    - name: Wait for operator namespaces to terminate
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ item }}"
      register: ns_result
      until: ns_result.resources | length == 0
      retries: 60
      delay: 10
      loop:
        - gitlab-system
        - rhdh
        - rhdh-operator
        - quay-operator
        - openshift-devspaces
