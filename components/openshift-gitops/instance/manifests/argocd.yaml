apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: software-factory-argocd  # Can't be named "openshift-gitops".
  namespace: openshift-gitops
spec:
  installationID: "software-factory-argocd"
  resourceTrackingMethod: "annotation+label"

  # https://docs.redhat.com/en/documentation/red_hat_openshift_gitops/1.14/html/declarative_cluster_configuration/customizing-permissions-by-creating-aggregated-cluster-roles#aggregated-cluster-roles_customizing-permissions-by-creating-aggregated-cluster-roles
  aggregatedClusterRoles: true

  # Enable web-based terminal/exec feature for pods
  extraConfig:
    exec.enabled: "true"
    exec.shells: "bash,sh"
  
  applicationSet:
    resources:
      limits:
        # cpu: "2"
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi
    webhookServer:
      ingress:
        enabled: false
      route:
        enabled: false
  controller:
    processors: {}
    resources:
      limits:
        # cpu: "2"
        memory: 2Gi
      requests:
        cpu: 250m
        memory: 1Gi
    sharding: {}
  grafana:
    enabled: false
    ingress:
      enabled: false
    resources:
      limits:
        # cpu: 500m
        memory: 256Mi
      requests:
        cpu: 250m
        memory: 128Mi
    route:
      enabled: false
  ha:
    enabled: false
    resources:
      limits:
        # cpu: 500m
        memory: 256Mi
      requests:
        cpu: 250m
        memory: 128Mi
  initialSSHKnownHosts: {}
  kustomizeBuildOptions: '--enable-helm'
  monitoring:
    enabled: false
  notifications:
    enabled: false
  prometheus:
    enabled: false
    ingress:
      enabled: false
    route:
      enabled: false
  # Local user for RHDH integration (ArgoCD plugin + scaffolder).
  # The operator stores the token in a Secret named rhdh-local-user in the
  # openshift-gitops namespace; the rhdh-secrets-init job reads that Secret
  # and writes it to rhdh-secrets.
  localUsers:
    - name: rhdh
      apiKey: true
      tokenLifetime: "0"  # non-expiring

  # See docs/decisions/0006-cluster-admins-group-for-argocd-rbac.md
  rbac:
    defaultPolicy: ""
    policy: |
      g, cluster-admins, role:admin
      p, role:admin, exec, create, */*, allow
      p, rhdh, applications, get, */*, allow
      p, rhdh, applications, create, */*, allow
      p, rhdh, applications, sync, */*, allow
      p, rhdh, projects, get, */*, allow
    scopes: '[groups]'
  redis:
    resources:
      limits:
        # cpu: 500m
        memory: 256Mi
      requests:
        cpu: 250m
        memory: 128Mi
  repo:
    resources:
      limits:
        # cpu: "1"
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 256Mi
  resourceExclusions: |
    - apiGroups:
      - tekton.dev
      clusters:
      - '*'
      kinds:
      - TaskRun
      - PipelineRun
  server:
    autoscale:
      enabled: false
    grpc:
      ingress:
        enabled: false
    ingress:
      enabled: false
    resources:
      limits:
        # cpu: 500m
        memory: 256Mi
      requests:
        cpu: 125m
        memory: 128Mi
    route:
      enabled: true
    service:
      type: ""
  sso:
    dex:
      openShiftOAuth: true
      resources:
        limits:
          # cpu: 500m
          memory: 256Mi
        requests:
          cpu: 250m
          memory: 128Mi
    provider: dex
  tls:
    ca: {}
