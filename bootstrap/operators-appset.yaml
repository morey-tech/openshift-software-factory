apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: operators
  namespace: openshift-gitops
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    # See ../docs/decisions/0001-use-git-files-generator-for-applicationsets.md
    - git:
        repoURL: https://github.com/morey-tech/openshift-software-factory.git
        revision: main
        files:
          - path: "components/*/operator/config.json"
      selector:
        matchExpressions:
          # See ../docs/decisions/0003-disable-flag-in-config-json.md
          - key: disabled
            operator: NotIn
            values:
              - "true"
          # See ../docs/decisions/0011-decouple-gitops-instance-from-bootstrap-cascade.md
          - key: standalone
            operator: NotIn
            values:
              - "true"
  template:
    metadata:
      name: "{{ index .path.segments 1 }}-operator"
    spec:
      project: operators  # See ../docs/decisions/0013-appproject-per-appset.md
      source:
        repoURL: https://github.com/morey-tech/openshift-software-factory.git
        targetRevision: main
        path: "{{ .path.path }}/manifests"
        # See ../docs/decisions/0009-manifests-subdirectory-for-appset-source-path.md
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          # See ../docs/decisions/0004-auto-create-namespaces-in-applicationsets.md
          - CreateNamespace=true
